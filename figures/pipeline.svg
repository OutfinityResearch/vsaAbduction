<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="360"><rect width="100%" height="100%" fill="#ffffff"/><text x="590" y="30" text-anchor="middle" font-family="Arial" font-size="20" font-weight="700">Experiment pipeline</text><rect x="45" y="105" rx="14" ry="14" width="190" height="110" fill="#f7f7f7" stroke="#333" stroke-width="1.5"/><text x="140" y="139" text-anchor="middle" font-family="Arial" font-size="15" font-weight="700">Artifact cards</text><text x="140" y="157" text-anchor="middle" font-family="Arial" font-size="15" font-weight="700">and event logs</text><text x="140" y="189" text-anchor="middle" font-family="Arial" font-size="12" fill="#444">Textual SF micro-world</text><line x1="239" y1="160" x2="262" y2="160" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/><rect x="270" y="105" rx="14" ry="14" width="190" height="110" fill="#f7f7f7" stroke="#333" stroke-width="1.5"/><text x="365" y="139" text-anchor="middle" font-family="Arial" font-size="15" font-weight="700">Deterministic parser</text><text x="365" y="189" text-anchor="middle" font-family="Arial" font-size="12" fill="#444">Extract words and event labels</text><line x1="464" y1="160" x2="487" y2="160" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/><rect x="495" y="105" rx="14" ry="14" width="190" height="110" fill="#f7f7f7" stroke="#333" stroke-width="1.5"/><text x="590" y="139" text-anchor="middle" font-family="Arial" font-size="15" font-weight="700">VSA/HDC encoding</text><text x="590" y="189" text-anchor="middle" font-family="Arial" font-size="12" fill="#444">Bundle words into vectors</text><line x1="689" y1="160" x2="712" y2="160" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/><rect x="720" y="105" rx="14" ry="14" width="190" height="110" fill="#f7f7f7" stroke="#333" stroke-width="1.5"/><text x="815" y="139" text-anchor="middle" font-family="Arial" font-size="15" font-weight="700">Abductive invariant</text><text x="815" y="189" text-anchor="middle" font-family="Arial" font-size="12" fill="#444">Find sparse latent property</text><line x1="914" y1="160" x2="937" y2="160" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/><rect x="945" y="105" rx="14" ry="14" width="190" height="110" fill="#f7f7f7" stroke="#333" stroke-width="1.5"/><text x="1040" y="139" text-anchor="middle" font-family="Arial" font-size="15" font-weight="700">Evaluation</text><text x="1040" y="189" text-anchor="middle" font-family="Arial" font-size="12" fill="#444">Prediction, novelty, repair, control</text><defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#333"/></marker></defs><text x="590" y="285" text-anchor="middle" font-family="Arial" font-size="13">The hidden oracle is used only before and after the abductor: before, to generate labels; after, to verify held-out predictions and repairs.</text></svg>